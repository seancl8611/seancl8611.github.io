<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 650" font-family="Segoe UI, Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="1050" height="650" fill="#fff"/>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#555">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
    <marker id="arrBlue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#1565C0">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
    <marker id="arrGrn" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#2E7D32">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
    <marker id="arrOrg" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#BF360C">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
    <marker id="arrPurp" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#7B1FA2">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
    <marker id="arrTeal" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#00838F">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="525" y="28" font-size="15" font-weight="600" fill="#222" text-anchor="middle">Azure Infrastructure &amp; Observability Lab — Architecture</text>
  <text x="525" y="44" font-size="10" fill="#888" text-anchor="middle">Terraform + GitHub Actions (OIDC) + Azure Monitor  ·  Azure Free Account</text>

  <!-- =============================== -->
  <!-- ENTRA ID (Tenant-level, OUTSIDE -->
  <!-- the subscription boundary)      -->
  <!-- =============================== -->
  <rect x="220" y="58" width="200" height="82" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <rect x="220" y="58" width="200" height="22" rx="4" fill="#1565C0"/>
  <rect x="220" y="74" width="200" height="6" fill="#1565C0"/>
  <text x="320" y="74" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Microsoft Entra ID (Tenant)</text>

  <text x="234" y="98" font-size="9" fill="#444">App Registration (Service Principal)</text>
  <text x="234" y="112" font-size="9" fill="#444">Federated Credentials (OIDC)</text>
  <text x="234" y="126" font-size="9" fill="#444">Contributor role on subscription</text>

  <!-- =============================== -->
  <!-- AZURE SUBSCRIPTION BOUNDARY     -->
  <!-- =============================== -->
  <rect x="200" y="150" width="830" height="390" rx="6" fill="none" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="215" y="168" font-size="10" font-weight="600" fill="#0078D4">Azure Subscription</text>

  <!-- =============================== -->
  <!-- GITHUB ACTIONS (outside Azure)  -->
  <!-- =============================== -->
  <rect x="15" y="58" width="170" height="215" rx="4" fill="#F5F5F5" stroke="#555" stroke-width="1.2"/>
  <rect x="15" y="58" width="170" height="24" rx="4" fill="#24292E"/>
  <rect x="15" y="74" width="170" height="8" fill="#24292E"/>
  <text x="100" y="75" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">GitHub Actions</text>

  <text x="30" y="100" font-size="9.5" font-weight="600" fill="#333">CI/CD Pipeline</text>

  <rect x="30" y="108" width="140" height="34" rx="3" fill="#fff" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="100" y="123" font-size="8.5" font-weight="600" fill="#2E7D32" text-anchor="middle">On Pull Request</text>
  <text x="100" y="135" font-size="8" fill="#444" text-anchor="middle">fmt · validate · plan</text>

  <rect x="30" y="150" width="140" height="34" rx="3" fill="#fff" stroke="#BF360C" stroke-width="0.8"/>
  <text x="100" y="165" font-size="8.5" font-weight="600" fill="#BF360C" text-anchor="middle">On Push to Main</text>
  <text x="100" y="177" font-size="8" fill="#444" text-anchor="middle">terraform apply</text>

  <text x="30" y="204" font-size="8.5" fill="#7B1FA2" font-weight="600">Auth: OIDC Federation</text>
  <text x="30" y="216" font-size="8" fill="#666">No stored secrets</text>
  <text x="30" y="228" font-size="8" fill="#666">Short-lived tokens only</text>
  <text x="30" y="240" font-size="8" fill="#666">Env: production (approval)</text>
  <text x="30" y="258" font-size="8" fill="#00838F" font-weight="600">Backend: azurerm (remote state)</text>

  <!-- GitHub → Entra OIDC arrow -->
  <line x1="185" y1="100" x2="218" y2="100" stroke="#1565C0" stroke-width="1.2" marker-end="url(#arrBlue)"/>
  <text x="202" y="94" font-size="7.5" fill="#1565C0" text-anchor="middle">OIDC</text>

  <!-- =============================== -->
  <!-- rg-tfstate (inside subscription)-->
  <!-- =============================== -->
  <rect x="840" y="165" width="175" height="75" rx="4" fill="#E0F7FA" stroke="#00838F" stroke-width="1.2"/>
  <rect x="840" y="165" width="175" height="22" rx="4" fill="#00838F"/>
  <rect x="840" y="181" width="175" height="6" fill="#00838F"/>
  <text x="928" y="182" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">rg-tfstate</text>

  <text x="854" y="204" font-size="9" font-weight="600" fill="#333">Storage Account</text>
  <text x="864" y="218" font-size="8" fill="#444">Container: tfstate</text>
  <text x="864" y="231" font-size="8" fill="#444">Terraform remote state (versioned)</text>

  <!-- GitHub → rg-tfstate (state arrow — from GitHub box to storage) -->
  <path d="M185,190 L197,190 L197,202 L838,202" fill="none" stroke="#00838F" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrTeal)"/>
  <text x="510" y="196" font-size="7.5" fill="#00838F" text-anchor="middle">terraform init / plan / apply reads + writes state</text>

  <!-- GitHub → rg-infra-lab-dev (deploy arrow) -->
  <path d="M185,168 L197,168 L197,400 L234,400" fill="none" stroke="#2E7D32" stroke-width="1.2" marker-end="url(#arrGrn)"/>
  <text x="200" y="340" font-size="8" fill="#2E7D32" transform="rotate(-90,200,340)">deploy resources</text>

  <!-- =============================== -->
  <!-- rg-infra-lab-dev                -->
  <!-- =============================== -->
  <rect x="220" y="250" width="595" height="275" rx="4" fill="#FAFAFA" stroke="#555" stroke-width="1"/>
  <text x="234" y="268" font-size="10" font-weight="600" fill="#333">rg-infra-lab-dev</text>

  <!-- =============================== -->
  <!-- VNET                             -->
  <!-- =============================== -->
  <rect x="236" y="278" width="360" height="232" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <rect x="236" y="278" width="360" height="22" rx="4" fill="#2E7D32"/>
  <rect x="236" y="294" width="360" height="6" fill="#2E7D32"/>
  <text x="416" y="294" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">VNet: vnet-lab-dev (10.0.0.0/16)</text>

  <!-- snet-web -->
  <rect x="252" y="308" width="328" height="108" rx="3" fill="#fff" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="262" y="324" font-size="9.5" font-weight="600" fill="#2E7D32">snet-web (10.0.1.0/24)</text>

  <!-- NSG web -->
  <rect x="262" y="332" width="160" height="50" rx="3" fill="#FFF3E0" stroke="#BF360C" stroke-width="0.8"/>
  <text x="272" y="346" font-size="8.5" font-weight="600" fill="#BF360C">NSG: nsg-web-dev</text>
  <text x="272" y="358" font-size="8" fill="#444">Allow SSH (22) from allowed_ssh_ip</text>
  <text x="272" y="370" font-size="8" fill="#444">Allow HTTP (80) from Internet (*)</text>
  <text x="272" y="380" font-size="8" fill="#999">Deny all other inbound</text>

  <!-- VM -->
  <rect x="262" y="388" width="160" height="24" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="272" y="404" font-size="8.5" font-weight="600" fill="#1565C0">vm-web-dev (Standard_D2s_v3)</text>

  <!-- VM detail line -->
  <text x="272" y="414" font-size="7.5" fill="#444">Ubuntu 22.04 LTS · nginx · stress-ng · AMA</text>

  <!-- Public IP badge -->
  <rect x="436" y="332" width="134" height="24" rx="3" fill="#fff" stroke="#1565C0" stroke-width="0.8"/>
  <text x="503" y="348" font-size="8" fill="#1565C0" text-anchor="middle">Public IP (pip-web-vm-dev)</text>

  <!-- Auto-shutdown badge -->
  <rect x="436" y="362" width="134" height="20" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="503" y="376" font-size="7.5" fill="#F57F17" text-anchor="middle">Auto-shutdown: 11 PM EST</text>

  <!-- VM → Public IP arrow -->
  <line x1="422" y1="398" x2="436" y2="345" stroke="#1565C0" stroke-width="0.8" marker-end="url(#arrBlue)"/>

  <!-- snet-mgmt -->
  <rect x="252" y="426" width="328" height="42" rx="3" fill="#fff" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="262" y="442" font-size="9.5" font-weight="600" fill="#2E7D32">snet-mgmt (10.0.2.0/24)</text>

  <!-- NSG mgmt -->
  <rect x="262" y="452" width="160" height="14" rx="3" fill="#FFF3E0" stroke="#BF360C" stroke-width="0.8"/>
  <text x="272" y="462" font-size="7.5" fill="#BF360C">NSG: SSH from allowed_ssh_ip only</text>

  <text x="436" y="462" font-size="7.5" fill="#999" font-style="italic">Reserved for future bastion/mgmt VMs</text>

  <!-- =============================== -->
  <!-- MONITORING (right side of rg)    -->
  <!-- =============================== -->
  <rect x="618" y="278" width="185" height="128" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.2"/>
  <rect x="618" y="278" width="185" height="22" rx="4" fill="#7B1FA2"/>
  <rect x="618" y="294" width="185" height="6" fill="#7B1FA2"/>
  <text x="710" y="294" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Monitoring</text>

  <text x="630" y="316" font-size="9" font-weight="600" fill="#333">Log Analytics Workspace</text>
  <text x="640" y="329" font-size="8" fill="#444">law-infra-lab-dev (30-day retention)</text>

  <text x="630" y="346" font-size="9" font-weight="600" fill="#333">Data Collection Rule + AMA</text>
  <text x="640" y="359" font-size="8" fill="#444">Syslog: auth, kern, daemon, cron…</text>
  <text x="640" y="371" font-size="8" fill="#444">Perf: CPU, Memory, Disk, Network</text>

  <text x="630" y="388" font-size="9" font-weight="600" fill="#333">KQL Queries</text>
  <text x="640" y="400" font-size="8" fill="#444">Failed SSH · CPU trends · Disk usage</text>

  <!-- VM → DCR arrow (AMA data flow) — routes above Public IP box -->
  <path d="M422,393 L432,393 L432,315 L616,315" fill="none" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrPurp)"/>
  <text x="524" y="310" font-size="7.5" fill="#7B1FA2" text-anchor="middle">AMA agent sends logs + perf counters</text>

  <!-- =============================== -->
  <!-- ALERT RULES                      -->
  <!-- =============================== -->
  <rect x="618" y="418" width="185" height="100" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>
  <rect x="618" y="418" width="185" height="22" rx="4" fill="#C62828"/>
  <rect x="618" y="434" width="185" height="6" fill="#C62828"/>
  <text x="710" y="434" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Alert Rules</text>

  <text x="630" y="456" font-size="8.5" fill="#444">CPU > 80% avg / 5 min</text>
  <text x="640" y="468" font-size="7.5" fill="#999">Platform metric alert on VM · Sev 2</text>

  <text x="630" y="484" font-size="8.5" fill="#444">VM availability missing 5 min</text>
  <text x="640" y="496" font-size="7.5" fill="#999">Platform metric alert on VM · Sev 1</text>

  <text x="630" y="512" font-size="8" fill="#7B1FA2" font-weight="600">→ Action Group: email notification</text>

  <!-- Monitoring → Alerts connection arrow -->
  <line x1="710" y1="406" x2="710" y2="416" stroke="#C62828" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Alert scoped-to-VM arrow (from VM area to alerts) -->
  <path d="M596,410 L608,410 L608,460 L616,460" fill="none" stroke="#C62828" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="604" y="448" font-size="7.5" fill="#C62828" transform="rotate(-90,604,448)">scoped to VM</text>

  <!-- =============================== -->
  <!-- LEGEND                           -->
  <!-- =============================== -->
  <line x1="15" y1="560" x2="1035" y2="560" stroke="#ddd" stroke-width="0.6"/>

  <rect x="15" y="574" width="10" height="10" rx="2" fill="#1565C0"/>
  <text x="31" y="583" font-size="9" fill="#555">Entra ID / Compute</text>

  <rect x="155" y="574" width="10" height="10" rx="2" fill="#2E7D32"/>
  <text x="171" y="583" font-size="9" fill="#555">Networking (VNet / Subnets)</text>

  <rect x="325" y="574" width="10" height="10" rx="2" fill="#BF360C"/>
  <text x="341" y="583" font-size="9" fill="#555">NSGs / Security Rules</text>

  <rect x="480" y="574" width="10" height="10" rx="2" fill="#7B1FA2"/>
  <text x="496" y="583" font-size="9" fill="#555">Monitoring / Log Analytics</text>

  <rect x="650" y="574" width="10" height="10" rx="2" fill="#C62828"/>
  <text x="666" y="583" font-size="9" fill="#555">Alert Rules</text>

  <rect x="750" y="574" width="10" height="10" rx="2" fill="#00838F"/>
  <text x="766" y="583" font-size="9" fill="#555">Terraform State</text>

  <rect x="870" y="574" width="10" height="10" rx="2" fill="#24292E"/>
  <text x="886" y="583" font-size="9" fill="#555">GitHub Actions (CI/CD)</text>

  <line x1="15" y1="600" x2="55" y2="600" stroke="#555" stroke-width="1.2"/>
  <text x="61" y="604" font-size="9" fill="#555">Direct connection</text>

  <line x1="170" y1="600" x2="210" y2="600" stroke="#555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="216" y="604" font-size="9" fill="#555">Data flow / evaluation</text>

  <rect x="355" y="595" width="50" height="12" rx="2" fill="none" stroke="#0078D4" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="411" y="605" font-size="9" fill="#555">Azure Subscription boundary</text>

  <text x="525" y="640" font-size="8" fill="#ccc" text-anchor="middle">Sean Clarke — Azure Infrastructure &amp; Observability Lab</text>

</svg>
